<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guía de Proyectos</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#f5f5f5;
      color:#333;
    }

    /* IMAGEN PRINCIPAL */

    .hero{
	  width:100%;
	  min-height:100vh;
	  background:url('guia.png');
	  background-size:contain;	
	  background-repeat:no-repeat;
	  background-position:center;
	  background-color:#e7dcc5;
	  display:flex;
	  justify-content:center;
	  align-items:center;
	  position:relative;
	  padding:40px;
	}

    .hero h1{
      position:relative;
      color:white;
      font-size:3rem;
      text-align:center;
      padding:20px;
    }

    /* TARJETAS */

    .opciones{
      width:90%;
      max-width:1200px;
      margin:60px auto;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:30px;
    }

    .card{
      background:white;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      transition:0.3s ease;
      cursor:pointer;
    }

    .card:hover{
      transform:translateY(-10px);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
      transition:0.3s;
    }

    .card-content{
      padding:20px;
      text-align:center;
    }

    .card-content h2{
      margin-bottom:10px;
      font-size:1.5rem;
    }

    .card-content p{
      color:#666;
      line-height:1.5;
    }

    /* BOTÓN */

    .boton-container{
      text-align:center;
      margin-bottom:60px;
    }

    .boton{
      display:inline-block;
      padding:15px 40px;
      background:black;
      color:white;
      text-decoration:none;
      border-radius:40px;
      font-size:1.1rem;
      transition:0.3s;
    }

    .boton:hover{
      background:#333;
      transform:scale(1.05);
    }

    /* MODAL IMAGEN */

    .modal{
      display:none;
      position:fixed;
      z-index:1000;
      left:0;
      top:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .modal img{
      max-width:90%;
      max-height:90%;
      border-radius:15px;
      animation:zoom 0.3s ease;
    }

    @keyframes zoom{
      from{
        transform:scale(0.7);
        opacity:0;
      }

      to{
        transform:scale(1);
        opacity:1;
      }
    }

    .cerrar{
      position:absolute;
      top:20px;
      right:35px;
      color:white;
      font-size:40px;
      cursor:pointer;
    }

  </style>
</head>

<body>

  <section class="hero">
    <h1></h1>
  </section>

  <section class="opciones">

    <div class="card">
      <a href="modulo1.html"><img src="vibra.png"></a>

      <div class="card-content">
        <h2>Vibración</h2>
        <p>MÓDULO 1: Explorando la vibración</p>
      </div>
    </div>

    <div class="card">
      <a href="modulo2.html"><img src="motor.png"></a>

      <div class="card-content">
        <h2>El movimiento</h2>
        <p>MÓDULO 2: Motores y movimiento</p>
      </div>
    </div>

    <div class="card">
      <a href="modulo3.html"><img src="diseno.png"></a>

      <div class="card-content">
        <h2>Imagina y crea</h2>
        <p>MÓDULO 3: Diseño y modelado 3D</p>
      </div>
    </div>

    <div class="card">
      <a href="modulo4.html"><img src="proto.png"></a>

      <div class="card-content">
        <h2>Prueba, equivocate y aprendemos</h2>
        <p>MÓDULO 4: Prototipado</p>
      </div>
    </div>

     <div class="card">
      <a href="modulo5.html"><img src="fabri.png"></a>

      <div class="card-content">
        <h2>Manos a la obra</h2>
        <p>MÓDULO 5: Fabricación</p>
      </div>
    </div>

    <div class="card">
      <a href="modulo6.html"><img src="evalua.png"></a>

      <div class="card-content">
        <h2>Evalua!!</h2>
        <p>Módulo 6: Evaluación y Mejora</p>
      </div>
    </div>

  </section>

  <div class="boton-container">
    <a href="vista3d.png" class="boton">
      Ver Diseño 3D
    </a>
  </div>

  <div class="modal" id="modal">
    <span class="cerrar">&times;</span>
    <img id="imagenExpandida">
  </div>

  <script>

    const imagenes = document.querySelectorAll('.card img');
    const modal = document.getElementById('modal');
    const imagenExpandida = document.getElementById('imagenExpandida');
    const cerrar = document.querySelector('.cerrar');

    imagenes.forEach(img => {
      img.addEventListener('click', () => {
        modal.style.display = 'flex';
        imagenExpandida.src = img.src;
      });
    });

    cerrar.addEventListener('click', () => {
      modal.style.display = 'none';
    });

    modal.addEventListener('click', (e) => {
      if(e.target === modal){
        modal.style.display = 'none';
      }
    });

  </script>

</body>
</html>
