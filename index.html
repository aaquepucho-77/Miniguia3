<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Página Principal</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      background-image: 
      linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
      url('zaranda.png');
      
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
    }

    .contenido{
      max-width:800px;
      padding:20px;
      animation: aparecer 1.5s ease;
    }

    h1{
      font-size:2.5rem;
      line-height:1.5;
      margin-bottom:30px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
    }

    .boton{
      display:inline-block;
      padding:15px 35px;
      background:white;
      color:black;
      text-decoration:none;
      font-size:1.1rem;
      font-weight:bold;
      border-radius:40px;
      transition:0.3s ease;
    }

    .boton:hover{
      background:#dcdcdc;
      transform:scale(1.05);
    }

    @keyframes aparecer{
      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:768px){
      h1{
        font-size:1.8rem;
      }

      .boton{
        padding:12px 28px;
      }
    }
  </style>
</head>

<body>

  <div class="contenido">
    <h1>
      “Transformando ideas en procesos: descubre cómo la creatividad y el trabajo manual dan vida a cada proyecto.”
    </h1>

    <a href="pagina2.html" class="boton">
      Comenzar
    </a>
  </div>

</body>
</html>
